<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuxdo list</title>
    <link rel="icon" type="image/x-icon" href="https://upload.wikimedia.org/wikipedia/commons/a/af/Tux.png">
</head>

<body>
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/Tux.png" alt="tux" width="30px">
        <h1><span>Tux</span>do list</h1>
    </header>
    <div class="main__container">
        <div id="project">
            <h2>Project</h2>
            <div id="new__project__container">
                <button id="project__new">New</button>

            </div>
            <div id="projects">

            </div>
        </div>
        <div id="content">
            <h2>To do</h2>
            <button command="show-modal" commandfor="task-dialog" id="add__task">+ Add task</button>
            <div>
                <dialog id="task-dialog">
                    <form method="dialog">
                        <h3>Add a new task</h4>
                            <section id="inputs">
                                <label for="name">Name</label>
                                <input id="name" type="text" placeholder="Read Don Quijote de la Mancha" required>
                                <label for="description">Description</label>
                                <textarea id="description" type="text"
                                    placeholder="Read the chapter 23 of the first part" required></textarea>
                                <label for="dueDate">Due date</label>
                                <input id="dueDate" type="date" required>
                                <label for="priority">Priority</label>
                                <select id="priority" name="priority" required>
                                    <option value="high">High</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="low">Low</option>
                                </select>
                            </section>
                            <menu>
                                <button id="submit__button" type="submit">+ Add</button>
                            </menu>
                    </form>
                    <div class="close__box">
                        <button id="close" commandfor="task-dialog" command="close">[X] Close</button>
                    </div>
                </dialog>
            </div>
        </div>
    </div>

</body>

</html>
